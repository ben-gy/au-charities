name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # The Data Pipeline commits new data via GITHUB_TOKEN, and pushes made with
  # that token don't trigger other workflows — so a data update would never
  # redeploy on its own. Run after Data Pipeline completes to pick up new data.
  workflow_run:
    workflows: ["Data Pipeline"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # On workflow_run, only deploy if the upstream Data Pipeline succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
